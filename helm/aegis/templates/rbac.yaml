apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-api-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aegis-api-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aegis-api-rolebinding
subjects:
  - kind: ServiceAccount
    name: aegis-api-sa
roleRef:
  kind: Role
  name: aegis-api-role
  apiGroup: rbac.authorization.k8s.io
