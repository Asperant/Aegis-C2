apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
spec:
  replicas: {{ .Values.replicas.api }}
  selector:
    matchLabels:
      app: aegis-api
  template:
    metadata:
      labels:
        app: aegis-api
    spec:
      serviceAccountName: aegis-api-sa
      containers:
        - name: aegis-api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.api.port }}
          envFrom:
            - configMapRef:
                name: aegis-config
            - secretRef:
                name: aegis-secrets
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-api-service
spec:
  type: ClusterIP # Sadece Cluster icerisinden (Nginx uzerinden) erisilsin
  selector:
    app: aegis-api
  ports:
    - port: 8080
      targetPort: 8080
