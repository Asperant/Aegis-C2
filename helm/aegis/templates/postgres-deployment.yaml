apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-initdb
data:
  init.sql: |
{{ .Files.Get "init.sql" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-db
  template:
    metadata:
      labels:
        app: aegis-db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.database.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aegis-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: aegis-pg-pvc-v2
        - name: initdb
          configMap:
            name: {{ .Release.Name }}-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-db-service
spec:
  type: ClusterIP
  selector:
    app: aegis-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aegis-pg-pvc-v2
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.database.storage }}
