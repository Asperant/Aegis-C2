version: "3.8"

services:
  aegis_gks:
    build: 
      context: ./GKS_Server
    image: aegis-c2-aegis_gks:latest
    environment:
      DB_HOST: ${DB_HOST:-aegis_db}
      DB_USER: ${DB_USER:-admin}
      DB_PASS: ${DB_PASS:-CHANGE_ME_LOCAL_PASSWORD}
      DB_NAME: ${DB_NAME:-aegis_hq}
      REDIS_HOST: ${REDIS_HOST:-redis_db}
      REDIS_PORT: ${REDIS_PORT:-6379}
      GKS_KEY_PASSPHRASE: ${GKS_KEY_PASSPHRASE:-}
    volumes:
      - ./keys:/app/keys:ro

  aegis_api:
    build: 
      context: ./Aegis_API
    image: aegis-c2-aegis_api:latest
    environment:
      DB_PASS: ${DB_PASS:-CHANGE_ME_LOCAL_PASSWORD}
      Auth__CommanderPassword: ${AUTH_PASSWORD:-}
      Jwt__Secret: ${JWT_SECRET:-}
      HOST_KEYS_PATH: ${HOST_KEYS_PATH:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  aegis_ui:
    build:
      context: ./aegis-ui
      args:
        - VITE_API_URL=/api
        - VITE_HUB_URL=/telemetryHub
    image: aegis-c2-aegis_ui:latest

  aegis_uav:
    build: 
      context: ./UAV_Client
    image: aegis-c2-aegis_uav:latest
    volumes:
      - ./keys:/keys:ro

  aegis_gateway:
    build: 
      context: ./nginx
    image: aegis-c2-aegis_gateway:latest
    ports:
      - "8080:80"
    depends_on:
      - aegis_api
      - aegis_ui
      - aegis_gks

  redis_db:
    image: redis:alpine
    ports:
      - "6379:6379"

  aegis_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-CHANGE_ME_LOCAL_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-aegis_hq}
    ports:
      - "5432:5432"
    volumes:
      - ./helm/aegis/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
