# =============================================
# AEGIS C2 — API GATEWAY (Nginx Reverse Proxy)
# =============================================

# Rate Limiting Zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

upstream aegis_api {
    server aegis_api:8080;
}

upstream aegis_ui {
    server aegis_ui:80;
}

server {
    listen 80;
    server_name _;

    # --- Güvenlik Başlıkları ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

    # --- Frontend (React SPA) ---
    location / {
        proxy_pass http://aegis_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API Endpoints ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://aegis_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Auth Endpoint (Daha sıkı rate limit) ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://aegis_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SignalR WebSocket (Telemetri Tüneli) ---
    location /telemetryHub {
        proxy_pass http://aegis_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout ayarları
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Swagger (Sadece geliştirme ortamında) ---
    location /swagger {
        proxy_pass http://aegis_api;
        proxy_set_header Host $host;
    }
}
